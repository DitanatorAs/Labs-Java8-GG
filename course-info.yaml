title: Labs_JB_8_ver4
language: Russian
summary: 'Цель курса - научить программированию Java «с нуля». Выпускники курса смогут
  успешно продолжать освоение любой из высокоуровневых технологий семейства Java:
  от приложений для мобильных устройств до Интернет-приложений и многопользовательских
  корпоративных систем. Курс ориентирован на практическое применение технологии Javа,
  и содержит большое число практических заданий.'
